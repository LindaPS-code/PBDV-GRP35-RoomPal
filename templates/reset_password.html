{% extends "base.html" %}
 <!-- Resetting Password page -->
{% block title %}Reset Password - StudentShare{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-3">Choose a New Password</h2>
    <p class="text-center mb-4" style="color: var(--gray);">Create a new password for your StudentShare account.</p>

    <form method="POST" action="{{ url_for('reset_password', token=token) }}" data-validate>
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" class="form-control" id="password" name="password" required minlength="8" placeholder="Enter your new password" data-strength>
            <small style="color: var(--gray);">Use at least 8 characters.</small>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="8" placeholder="Re-enter your new password">
        </div>

        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" style="color: var(--secondary); font-weight: 600;">Back to login</a>
    </div>
</div>
{% endblock %}
