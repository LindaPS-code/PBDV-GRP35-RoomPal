{% extends "base.html" %}

{% block title %}Forgot Password - StudentShare{% endblock %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-3">Reset Your Password</h2>
    <p class="text-center mb-4" style="color: var(--gray);">Enter your account email and we'll send you a reset link.</p>

    <form method="POST" action="{{ url_for('forgot_password') }}" data-validate>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your account email">
        </div>

        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" style="color: var(--secondary); font-weight: 600;">Back to login</a>
    </div>
</div>
{% endblock %}
